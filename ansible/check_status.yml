---
- name: Contrôle de santé de la Calculatrice
  hosts: localhost
  tasks:
    - name: "Attente du démarrage de NiceGUI sur le port 8081"
      uri:
        url: "http://localhost:8081"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 20      # On laisse du temps à NiceGUI (100 secondes max)
      delay: 5
